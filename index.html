<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aurum | Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="screen" id="authScreen">
            <div class="auth-card">
                <div class="logo">
                    <div class="logo-icon">✨</div>
                    <h1>Aurum</h1>
                    <p>защищённый мессенджер</p>
                </div>
                <div class="tabs">
                    <button class="tab active" data-tab="login">Вход</button>
                    <button class="tab" data-tab="register">Регистрация</button>
                </div>
                <div class="form active" id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="loginBtn">Войти</button>
                </div>
                <div class="form" id="registerForm">
                    <input type="text" id="regName" placeholder="Ваше имя">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <button id="registerBtn">Создать аккаунт</button>
                </div>
                <div id="authMessage"></div>
            </div>
        </div>
        
        <div class="screen" id="mainScreen" style="display: none;">
            <div class="main-container">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <div class="user-name" id="userName">Загрузка...</div>
                        <button class="icon-btn" id="logoutMainBtn">🚪</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск...">
                    </div>
                    <div class="chats-list" id="chatsList">
                        <div class="empty-state">Нет чатов</div>
                    </div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <div class="chat-user">
                            <div class="chat-avatar" id="chatAvatar">👤</div>
                            <div>
                                <div class="chat-name" id="chatName">Выберите чат</div>
                                <div class="chat-status" id="chatStatus">онлайн</div>
                            </div>
                        </div>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        <div class="messages" id="messages">
                            <div class="empty-chat">Выберите чат чтобы начать общение</div>
                        </div>
                    </div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Сообщение">
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
